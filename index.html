<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL GHADIR | Management Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #C5A059; }
        body { font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; background-color: #FAF9F6; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .page-section { display: none; min-height: 80vh; }
        .active-section { display: block; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .nav-link { cursor: pointer; transition: color 0.3s; }
        .nav-link:hover { color: var(--accent); }
    </style>
</head>
<body class="text-[#1A1A1A]">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-8 md:py-14 transition-all" id="navbar">
        <div class="max-w-7xl mx-auto flex flex-col items-center">
            <h1 onclick="showPage('home')" class="text-6xl md:text-9xl font-bold tracking-[0.3em] uppercase cursor-pointer hover:opacity-70 transition-opacity mb-8">
                Al Ghadir
            </h1>
            
            <div class="w-full flex justify-between items-center">
                <div class="flex-1 flex gap-8 text-[10px] uppercase tracking-[0.3em] font-medium">
                    <span onclick="showPage('home')" class="nav-link">Shop</span>
                    <span onclick="showPage('size-guide')" class="nav-link">Size Guide</span>
                </div>
                
                <div class="flex-1 flex justify-end gap-6 items-center">
                    <button onclick="toggleCart()" class="relative group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                        <span id="cartBadge" class="absolute -top-1 -right-2 bg-[#C5A059] text-white text-[9px] rounded-full h-4 w-4 flex items-center justify-center opacity-0 transition-opacity">0</span>
                    </button>
                    <button onclick="showPage('admin')" class="text-[9px] border border-black px-2 py-1 uppercase hover:bg-black hover:text-white transition">Admin</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="h-64 md:h-80"></div>

    <main>
        
        <section id="home" class="page-section active-section">
            <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-y-20 gap-x-10" id="productGrid">
                </div>
        </section>

        <section id="admin" class="page-section max-w-2xl mx-auto px-6 py-20">
            <div class="bg-white p-10 border shadow-xl">
                <h2 class="text-3xl italic mb-8">Inventory Manager</h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] uppercase tracking-widest block mb-2">Item Image</label>
                        <input type="file" id="itemImage" accept="image/*" class="w-full text-xs font-light file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest block mb-2">Item Name</label>
                        <input type="text" id="itemName" placeholder="e.g. Sahara Silk Wrap" class="w-full border-b py-2 focus:outline-none font-light">
                    </div>
                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-[10px] uppercase tracking-widest block mb-2">Price ($)</label>
                            <input type="number" id="itemPrice" placeholder="299" class="w-full border-b py-2 focus:outline-none font-light">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase tracking-widest block mb-2">Short Description</label>
                        <textarea id="itemDesc" placeholder="Describe the fit and fabric..." class="w-full border-b py-2 focus:outline-none font-light h-24"></textarea>
                    </div>
                    <button onclick="uploadNewProduct()" class="w-full bg-[#C5A059] text-white py-4 uppercase text-[10px] tracking-[0.3em] font-bold shadow-lg hover:bg-black transition-all">Publish to Shop</button>
                </div>
                <div class="mt-10 border-t pt-6">
                    <button onclick="clearStorage()" class="text-[9px] text-red-400 uppercase tracking-widest">Reset Shop to Defaults</button>
                </div>
            </div>
        </section>

        <section id="size-guide" class="page-section max-w-4xl mx-auto px-6 py-20">
            <h2 class="text-4xl italic mb-10 text-center">Size Guide</h2>
            <div class="bg-white p-8 border border-gray-100 shadow-sm">
                <table class="w-full text-left border-collapse">
                    <thead class="border-b">
                        <tr class="text-[10px] uppercase tracking-widest text-gray-400"><th class="py-4">Size</th><th class="py-4">Bust (cm)</th><th class="py-4">Waist (cm)</th></tr>
                    </thead>
                    <tbody class="text-sm font-light">
                        <tr class="border-b"><td class="py-4 font-bold">Small</td><td class="py-4">84-88</td><td class="py-4">66-70</td></tr>
                        <tr class="border-b"><td class="py-4 font-bold">Medium</td><td class="py-4">89-93</td><td class="py-4">71-75</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section id="contact" class="page-section max-w-2xl mx-auto px-6 py-20 text-center">
            <h2 class="text-4xl italic mb-4">Contact</h2>
            <p class="font-light">concierge@alghadirfashion.com</p>
        </section>

    </main>

    <footer class="bg-white border-t border-gray-100 mt-20 py-20 px-6">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-10">
            <p class="text-[10px] uppercase tracking-widest text-gray-400">© 2026 Al Ghadir Fashion</p>
            <div class="flex gap-8 text-[10px] uppercase tracking-widest">
                <span onclick="showPage('contact')" class="nav-link">Contact</span>
                <span onclick="showPage('admin')" class="nav-link text-[#C5A059]">Inventory Manager</span>
            </div>
        </div>
    </footer>

    <div id="cartDrawer" class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-[70] shadow-2xl transition-transform duration-500 translate-x-full flex flex-col">
        <div class="p-8 border-b flex justify-between items-center"><h3 class="text-xl italic">Shopping Bag</h3><button onclick="toggleCart()" class="text-2xl font-light">&times;</button></div>
        <div id="cartItems" class="flex-1 overflow-y-auto p-8 space-y-6"></div>
        <div class="p-8 border-t space-y-4">
            <div class="flex justify-between font-bold"><span>Total</span><span id="cartTotal">$0.00</span></div>
            <button class="w-full bg-black text-white py-4 text-[10px] uppercase tracking-widest">Checkout</button>
        </div>
    </div>
    <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/30 z-[60] hidden backdrop-blur-sm"></div>

    <script>
        // INITIAL DATA
        const defaultProducts = [
            { id: 1711234, name: "Silk Flowing Midi", price: 240, desc: "Hand-woven silk", img: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&q=80&w=1000" },
            { id: 1711235, name: "Structured Blazer", price: 310, desc: "Linen blend", img: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?auto=format&fit=crop&q=80&w=1000" }
        ];

        let products = JSON.parse(localStorage.getItem('alghadir_items')) || defaultProducts;
        let cart = [];

        function showPage(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.getElementById(pageId).classList.add('active-section');
            window.scrollTo(0, 0);
        }

        function toggleCart() {
            document.getElementById('cartDrawer').classList.toggle('translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        // UPLOAD TOOL LOGIC
        function uploadNewProduct() {
            const name = document.getElementById('itemName').value;
            const price = document.getElementById('itemPrice').value;
            const desc = document.getElementById('itemDesc').value;
            const imageInput = document.getElementById('itemImage');

            if (!name || !price || !imageInput.files[0]) {
                alert("Please fill in all fields and select an image.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const newProduct = {
                    id: Date.now(),
                    name: name,
                    price: parseFloat(price),
                    desc: desc,
                    img: e.target.result // This saves the actual image data
                };

                products.unshift(newProduct);
                localStorage.setItem('alghadir_items', JSON.stringify(products));
                
                renderShop();
                showPage('home');
                
                // Clear form
                document.getElementById('itemName').value = '';
                document.getElementById('itemPrice').value = '';
                document.getElementById('itemDesc').value = '';
            };
            reader.readAsDataURL(imageInput.files[0]);
        }

        function renderShop() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="group cursor-pointer">
                    <div class="relative overflow-hidden aspect-[3/4] bg-[#F2F0ED]">
                        <img src="${p.img}" class="w-full h-full object-cover transition duration-1000 group-hover:scale-110">
                        <button onclick="addToCart(${p.id})" class="absolute bottom-0 w-full bg-white/95 py-5 translate-y-full group-hover:translate-y-0 transition-transform uppercase text-[10px] tracking-[0.2em] font-bold">Add to Bag</button>
                    </div>
                    <div class="mt-8">
                        <div class="flex justify-between items-baseline mb-2">
                            <h4 class="text-lg font-light tracking-tight">${p.name}</h4>
                            <span class="text-sm font-medium">$${p.price}</span>
                        </div>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest font-light">${p.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const item = products.find(p => p.id === id);
            cart.push(item);
            updateCartUI();
            toggleCart();
        }

        function updateCartUI() {
            const badge = document.getElementById('cartBadge');
            const list = document.getElementById('cartItems');
            const total = cart.reduce((s, i) => s + i.price, 0);

            badge.innerText = cart.length;
            badge.style.opacity = cart.length > 0 ? "1" : "0";
            list.innerHTML = cart.map(i => `<div class="flex gap-4 items-center"><img src="${i.img}" class="w-16 h-20 object-cover"><div class="text-[10px] uppercase font-bold">${i.name}<br><span class="font-light">$${i.price}</span></div></div>`).join('');
            document.getElementById('cartTotal').innerText = `$${total.toFixed(2)}`;
        }

        function clearStorage() {
            if(confirm("This will delete all custom uploaded items. Continue?")) {
                localStorage.removeItem('alghadir_items');
                location.reload();
            }
        }

        // Initial Load
        renderShop();
    </script>
</body>
</html>
